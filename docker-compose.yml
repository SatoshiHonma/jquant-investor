version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jquants-agent
    restart: unless-stopped
    volumes:
      # G:ドライブをマウントする想定 (ホスト側のパスは実際の環境に合わせて変更)
      # 例: G:/jquants-data:/app/data
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - TZ=Asia/Tokyo
